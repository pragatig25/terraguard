name: Refresh Demo Data

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate demo data
        run: python demo/generate_demo_data.py

      - name: Commit updated demo data
        run: |
          git config user.name "terraguard-bot"
          git config user.email "terraguard@users.noreply.github.com"
          git add docs/data/demo.json
          git diff --staged --quiet || git commit -m "chore: refresh demo data"
          git push
