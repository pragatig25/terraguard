name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  # Redeploy after data-producing workflows commit new metrics/demo data.
  # (A GITHUB_TOKEN push does not itself trigger a `push` event, so we chain
  # the deploy off the upstream workflow completing instead.)
  workflow_run:
    workflows:
      - "TerraGuard Baseline Capture"
      - "Refresh Demo Data"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || github.actor == github.repository_owner
    steps:
      - uses: actions/checkout@v4

      - name: Set CNAME if custom domain configured
        if: vars.CUSTOM_DOMAIN != ''
        run: echo "${{ vars.CUSTOM_DOMAIN }}" > docs/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
